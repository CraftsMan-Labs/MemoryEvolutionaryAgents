services:
  postgres_test:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: memory_agents_test
      POSTGRES_USER: memory_agents
      POSTGRES_PASSWORD: memory_agents
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U memory_agents -d memory_agents_test"]
      interval: 5s
      timeout: 3s
      retries: 20

  qdrant_test:
    image: qdrant/qdrant:v1.12.1
    ports:
      - "6334:6333"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:6333/healthz >/dev/null"]
      interval: 5s
      timeout: 3s
      retries: 20
